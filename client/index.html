<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPAS - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="card login-card p-4">
            <div class="card-body">
                <h3 class="text-center mb-4 text-primary fw-bold">OPAS Login</h3>
                <form id="loginForm">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                    <div id="errorMsg" class="mt-3 text-danger text-center" style="display:none;"></div>
                </form>
            </div>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
    <script>
        // Redirect if already logged in
        if (localStorage.getItem('token')) {
            const user = getCurrentUser();
            if (user.role === 'STUDENT') window.location.href = 'dashboard.html';
            else window.location.href = 'admin.html'; // Or general dashboard
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            try {
                const data = await login(username, password);
                if (data.role === 'STUDENT') {
                    window.location.href = 'dashboard.html';
                } else if (data.role === 'ADMIN' || data.role === 'FACULTY' || data.role === 'HOD' || data.role === 'WARDEN') {
                    window.location.href = 'admin.html'; // Dashboard for staff
                } else {
                    window.location.href = 'dashboard.html'; // Default
                }
            } catch (error) {
                errorMsg.innerText = "Login failed: " + error.message;
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
